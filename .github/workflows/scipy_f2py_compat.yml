name: SciPy f2py compatibility

# Builds scipy against this numpy to catch f2py regressions that break
# downstream .pyf callstatements and complex type access patterns.
# Triggered only when f2py source files change.

on:
  pull_request:
    branches:
      - main
      - maintenance/**
    paths:
      - 'numpy/f2py/**'

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scipy_f2py_compat:
    # To enable this job on a fork, comment out:
    if: github.repository == 'numpy/numpy'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Checkout numpy
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
        fetch-tags: true
        persist-credentials: false

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran libgfortran5 pkg-config

    - name: Install numpy build dependencies
      run: |
        pip install -r requirements/build_requirements.txt

    - name: Build and install numpy
      env:
        PKG_CONFIG_PATH: ./.openblas
      run: |
        pip install -r requirements/ci_requirements.txt
        mkdir -p .openblas
        python -c "import scipy_openblas64 as ob64; print(ob64.get_pkg_config())" > .openblas/scipy-openblas.pc
        spin build -- -Dcpu-baseline=none -Dcpu-dispatch=none
        pip install --no-build-isolation -e .

    - name: Clone scipy
      run: |
        git clone --depth=1 https://github.com/scipy/scipy.git /tmp/scipy

    - name: Build scipy against this numpy
      working-directory: /tmp/scipy
      run: |
        # Install scipy build deps (Cython, meson, pybind11, pythran)
        pip install -r requirements/build.txt
        pip install -r requirements/test.txt
        # Build scipy; this is the primary check -- f2py extensions must compile
        python dev.py build -- -Dcpu-baseline=none -Dcpu-dispatch=none

    - name: Test scipy.linalg (BLAS/LAPACK f2py wrappers)
      working-directory: /tmp/scipy
      run: |
        # scipy.linalg uses complex callstatements with ->r / ->i access
        python dev.py test -s linalg -- -x --timeout=300 --durations=10 -q 2>&1 | tail -40

    - name: Test scipy.interpolate (f2py Fortran wrappers)
      working-directory: /tmp/scipy
      run: |
        python dev.py test -s interpolate -- -x --timeout=300 --durations=10 -q 2>&1 | tail -20

    - name: Smoke test critical scipy imports
      run: |
        python -c "
        from scipy.linalg import blas, lapack
        from scipy.interpolate import splrep, splev
        import numpy as np
        # Quick sanity: complex BLAS operation
        x = np.array([1+2j, 3+4j], dtype=np.complex128)
        y = np.array([5+6j, 7+8j], dtype=np.complex128)
        result = blas.zaxpy(x, y)
        print('zaxpy result:', result)
        print('All scipy f2py imports OK')
        "
